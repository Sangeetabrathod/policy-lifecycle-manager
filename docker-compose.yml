version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: policy-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-policydb}
      POSTGRES_USER: ${POSTGRES_USER:-policyuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-policypass}
    ports:
      - "9000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-policyuser} -d ${POSTGRES_DB:-policydb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - policy-network

  redis:
    image: redis:7-alpine
    container_name: policy-redis
    ports:
      - "9001:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - policy-network

  backend:
    build: ./backend
    container_name: policy-backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://policy-postgres:5432/${POSTGRES_DB:-policydb}
      DB_USER: ${POSTGRES_USER:-policyuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-policypass}

      REDIS_HOST: policy-redis
      REDIS_PORT: 6379

      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-min-32-chars}

      AI_SERVICE_URL: http://policy-ai-service:5000
    ports:
      - "9003:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - policy-network

  frontend:
    build: ./frontend
    container_name: policy-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:9003
    ports:
      - "9002:80"
    restart: unless-stopped
    networks:
      - policy-network

  ai-service:
    build: ./ai-service
    container_name: policy-ai-service
    env_file:
      - .env
    ports:
      - "9004:5000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - policy-network

volumes:
  postgres_data:

networks:
  policy-network:
    driver: bridge