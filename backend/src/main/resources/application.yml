spring:
  application:
    name: policy-lifecycle-manager

  datasource:
    url: jdbc:postgresql://localhost:5432/policydb
    username: policyuser
    password: policypass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: bXlzdXBlcnNlY3JldGtleWZvcnRvb2wyOXBvbGljeWxpZmVjeWNsZQ==
  expiration-ms: 86400000

