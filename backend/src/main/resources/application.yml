spring:
  application:
    name: policy-lifecycle-manager

  datasource:
    url: ${DB_URL:jdbc:postgresql://policy-postgres:5432/policydb}
    username: ${DB_USER:policyuser}
    password: ${DB_PASSWORD:policypass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  data:
    redis:
      host: ${REDIS_HOST:policy-redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  task:
    scheduling:
      pool:
        size: 5

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-min-32-chars}
  expiration-ms: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.internship.tool: INFO
    org.springframework.scheduling: DEBUG

management:
  health:
    mail:
      enabled: false